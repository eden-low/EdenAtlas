# Netlify configuration for EdenAtlas — a static, buildless, multi-page site.
#
# No build step: publish is the repo root because every page uses plain relative paths to
# its siblings (styles.css, scripts.js, js/*, locales/*, images/*, etc.) — moving the site
# into a "public/" subdirectory would mean rewriting every relative reference across ~20
# HTML pages and every *.js module, a large, risky restructure this pass deliberately does
# not attempt (matching this repo's own established "hide, don't restructure" convention —
# see CLAUDE.md's history). Instead, the repo-root audit below is handled with an explicit
# denylist of non-site files via 404 redirects, not a true allowlisted publish directory.
#
# No SPA rewrite: every page is its own real .html file (home.html, login.html, resume.html,
# project.html, atlas.html, etc.) reachable at its exact path. A catch-all
# `/* -> /index.html 200` rewrite would silently serve the Portfolio for every typo'd/missing
# URL and break that direct-access model, so none is configured here — unmatched paths fall
# through to Netlify's own 404.

[build]
  publish = "."
  functions = "netlify/functions"
  # No [build.command] — nothing to compile. Every page is a plain, already-committed
  # HTML/CSS/JS file; the "build" is just Netlify copying the repo root as-is.

[functions]
  node_bundler = "esbuild"

# --- Repo-root audit: block non-site files from being served ---
# publish="." exposes every tracked file at its repo path unless explicitly blocked. None of
# the files below are secrets (see the completion report's secret audit), but they are not
# part of the deployed product and should not be publicly reachable at a stable URL:
#   - Security rules source (firestore.rules/storage.rules) and Firebase CLI config
#     (firebase.json/.firebaserc) — reveals rule implementation details for no product benefit.
#   - Internal project docs (CLAUDE.md, README.md, design-system.md, brand-book.md) — written
#     for contributors, not visitors.
#   - migrate-career.html — CLAUDE.md documents this as a "one-time, manually-run,
#     unlinked/unguarded page ... delete after running once"; it was never deleted, so this
#     blocks the only remaining exposure until that cleanup happens.
#   - tmp_chats.ts / tmp_types.ts — accidentally-tracked vendor SDK source (unrelated to the
#     site itself; flagged separately in the completion report for manual removal).
#   - Dotfiles (.gitignore, .firebaserc, .env*) and local tooling state (.netlify/) — Netlify
#     does not exclude dotfiles from a static publish directory by default.
# Each rule below shadows a real, publish-directory file: `to` intentionally repeats `from`
# (Netlify's documented pattern for "return 404 for this exact path without redirecting
# anywhere else") — `force = true` is required because otherwise Netlify's normal behaviour
# is to serve the file directly, skipping the redirect entirely since the file exists.
[[redirects]]
  from = "/firestore.rules"
  to = "/firestore.rules"
  status = 404
  force = true

[[redirects]]
  from = "/storage.rules"
  to = "/storage.rules"
  status = 404
  force = true

[[redirects]]
  from = "/firebase.json"
  to = "/firebase.json"
  status = 404
  force = true

[[redirects]]
  from = "/.firebaserc"
  to = "/.firebaserc"
  status = 404
  force = true

[[redirects]]
  from = "/CLAUDE.md"
  to = "/CLAUDE.md"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/README.md"
  status = 404
  force = true

[[redirects]]
  from = "/design-system.md"
  to = "/design-system.md"
  status = 404
  force = true

[[redirects]]
  from = "/brand-book.md"
  to = "/brand-book.md"
  status = 404
  force = true

[[redirects]]
  from = "/migrate-career.html"
  to = "/migrate-career.html"
  status = 404
  force = true

[[redirects]]
  from = "/tmp_chats.ts"
  to = "/tmp_chats.ts"
  status = 404
  force = true

[[redirects]]
  from = "/tmp_types.ts"
  to = "/tmp_types.ts"
  status = 404
  force = true

[[redirects]]
  from = "/.env*"
  to = "/.env*"
  status = 404
  force = true

[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/*"
  status = 404
  force = true

# --- Baseline security headers for the whole site ---
# Additive only: does not change caching behaviour for any page (service-worker.js already
# owns the app-shell caching strategy client-side) and does not touch Firebase/Google Sign-In,
# which this site depends on (an overly strict frame-ancestors/CSP here has broken Google
# Identity popups on other projects, so no CSP is introduced in this pass).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Functions responses: never cached by a shared/browser cache, since even the health check's
# behaviour is meant to reflect live status, not a stale snapshot.
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
